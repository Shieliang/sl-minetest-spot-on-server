name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: sl-minetest-spot-on-server-repo
  EKS_CLUSTER: sl-minetest-cluster
  CLOUDFORMATION_STACK_EFS: sl-minetest-spot-on-server-efs

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build, Tag, and Push Image to ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }} 
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./app/minetest-server
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    - name: Update EKS Kubeconfig
      run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

    - name: Deploy to EKS
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        # 1. 动态抓取最新的 EFS ID
        EFS_ID=$(aws cloudformation describe-stacks --stack-name ${{ env.CLOUDFORMATION_STACK_EFS }} --query "Stacks[0].Outputs[?OutputKey=='FileSystemId'].OutputValue" --output text)
        
        # 2. 注入镜像和 EFS ID (原地替换)
        sed -i "s|IMAGE_PLACEHOLDER|$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG|g" ./infrastructure/kubernetes/minetest.yaml
        sed -i "s|EFS_ID_PLACEHOLDER|$EFS_ID|g" ./infrastructure/kubernetes/minetest.yaml
        
        # 3. 执行 K8s 部署
        kubectl apply -f ./infrastructure/kubernetes/minetest.yaml
        
        # 4. 验证部署状态
        kubectl rollout status deployment/minetest-server