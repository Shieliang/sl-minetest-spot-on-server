name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: sl-minetest-spot-on-server-repo
  EKS_CLUSTER: sl-minetest-cluster

jobs:
  # --- 新增测试阶段 ---
  test-and-scan:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Run Kubernetes Linter
      uses: stackrox/kube-linter-action@v1
      with:
        directory: ./infrastructure/kubernetes
        # 💥 核心修复：显式指定配置文件路径
        config: ./.kube-linter.yaml

    - name: Build local image for scanning
      run: docker build -t temp-scan-image ./app/minetest-server

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'temp-scan-image'
        format: 'table'
        exit-code: '1' # 如果发现高危漏洞，直接中止流水线！
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

  # --- 修改部署阶段，增加依赖 ---
  deploy:
    needs: test-and-scan # 必须等测试通过了，才会开始部署！
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build, Tag, and Push Image to ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }} # 使用每次提交的唯一哈希作为版本号
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./app/minetest-server
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Update EKS Kubeconfig
      run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

    - name: Deploy to EKS
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        # 自动化替换 YAML 里的占位符并部署
        EFS_ID=$(aws cloudformation describe-stacks --stack-name sl-minetest-spot-on-server-efs --query "Stacks[0].Outputs[?OutputKey=='FileSystemId'].OutputValue" --output text)
        sed -i "s|IMAGE_PLACEHOLDER|$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG|g" ./infrastructure/kubernetes/minetest.yaml
        sed -i "s|EFS_ID_PLACEHOLDER|$EFS_ID|g" ./infrastructure/kubernetes/minetest.yaml
        kubectl apply -f ./infrastructure/kubernetes/minetest.yaml