# 1. 存储类：指定使用 EFS 驱动
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: efs-sc
provisioner: efs.csi.aws.com

---
# 2. 持久卷 (PV)：直接指向你的 AWS EFS 实例
apiVersion: v1
kind: PersistentVolume
metadata:
  name: minetest-pv
spec:
  capacity:
    storage: 10Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: efs-sc
  csi:
    driver: efs.csi.aws.com
    volumeHandle: EFS_ID_PLACEHOLDER # 这里的占位符会被 Makefile 自动替换

---
# 3. 持久卷声明 (PVC)：容器申请使用的“借条”
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minetest-pvc
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: efs-sc
  resources:
    requests:
      storage: 10Gi

---
# 4. Deployment：游戏服务端 (防弹增强版)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minetest-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minetest
  template:
    metadata:
      labels:
        app: minetest
    spec:
      securityContext:
        # 强制要求 Pod 以非 root 用户运行
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      
      initContainers:
      - name: fix-efs-permissions
        image: busybox:1.36 # 修复点：指定具体版本号
        command: ['sh', '-c', 'chmod 777 /home/minetestuser/.minetest/worlds']
        securityContext:
          runAsNonRoot: false # 明确允许这个初始化容器用 root，因为要改权限
          runAsUser: 0
          readOnlyRootFilesystem: false
        volumeMounts:
        - name: minetest-storage
          mountPath: /home/minetestuser/.minetest/worlds
        resources: # 修复点：给初始化容器也加上资源限制
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "100m"
            memory: "128Mi"

      containers:
      - name: minetest
        image: IMAGE_PLACEHOLDER
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false # 游戏需要写入日志和临时文件，暂时不设为只读
        ports:
        - containerPort: 30000
          protocol: UDP
        volumeMounts:
        - name: minetest-storage
          mountPath: /home/minetestuser/.minetest/worlds
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
      
      volumes:
      - name: minetest-storage
        persistentVolumeClaim:
          claimName: minetest-pvc
---
# 5. Service：暴露公网 IP
apiVersion: v1
kind: Service
metadata:
  name: minetest-service
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  type: LoadBalancer
  selector:
    app: minetest
  ports:
    - port: 30000
      targetPort: 30000
      protocol: UDP