# 1. 存储类：指定使用 EFS 驱动
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: efs-sc
provisioner: efs.csi.aws.com

---
# 2. 持久卷 (PV)：直接指向你的 AWS EFS 实例
apiVersion: v1
kind: PersistentVolume
metadata:
  name: minetest-pv
spec:
  capacity:
    storage: 10Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: efs-sc
  csi:
    driver: efs.csi.aws.com
    volumeHandle: EFS_ID_PLACEHOLDER # 这里的占位符会被 Makefile 自动替换

---
# 3. 持久卷声明 (PVC)：容器申请使用的“借条”
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minetest-pvc
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: efs-sc
  resources:
    requests:
      storage: 10Gi

---
# 4. Deployment：游戏服务端 (已获得 Linter 豁免权)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minetest-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minetest
  template:
    metadata:
      labels:
        app: minetest
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      
      initContainers:
      - name: fix-efs-permissions
        image: busybox:1.36
        command: ['sh', '-c', 'chmod 777 /home/minetestuser/.minetest/worlds']
        # Kube-linter 豁免：必须使用 root 来修改网络卷权限
        # nolint: run-as-non-root, no-read-only-root-fs
        securityContext:
          runAsUser: 0
          readOnlyRootFilesystem: false 
        volumeMounts:
        - name: minetest-storage
          mountPath: /home/minetestuser/.minetest/worlds
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "100m"
            memory: "128Mi"

      containers:
      - name: minetest
        # Kube-linter 豁免：IMAGE_PLACEHOLDER 会在运行时被 CI 替换
        # nolint: latest-tag
        image: IMAGE_PLACEHOLDER
        # Kube-linter 豁免：Minetest 引擎需要写入日志和缓存
        # nolint: no-read-only-root-fs
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
        ports:
        - containerPort: 30000
          protocol: UDP
        volumeMounts:
        - name: minetest-storage
          mountPath: /home/minetestuser/.minetest/worlds
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
      
      volumes:
      - name: minetest-storage
        persistentVolumeClaim:
          claimName: minetest-pvc
---
# 5. Service：暴露公网 IP
apiVersion: v1
kind: Service
metadata:
  name: minetest-service
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  type: LoadBalancer
  selector:
    app: minetest
  ports:
    - port: 30000
      targetPort: 30000
      protocol: UDP